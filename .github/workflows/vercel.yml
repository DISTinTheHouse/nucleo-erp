name: vercel

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      task:
        description: "Tipo de mantenimiento (ej. fake_migration)"
        required: true
        default: "fake_migration"
      app:
        description: "Nombre del app Django (ej. terceros)"
        required: true
        default: "terceros"
      migration:
        description: "Nombre/numero de migración (ej. 0005)"
        required: true
        default: "0005"

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django checks
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "false"
        run: |
          python manage.py check
          python manage.py makemigrations --dry-run --check

  migrate_production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Supabase URL (pooler)
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          python - <<'PY'
          import os
          from urllib.parse import urlparse
          url = os.environ.get("SUPABASE_DATABASE_URL", "")
          if not url:
              raise SystemExit("SUPABASE_DATABASE_URL no está configurada")
          p = urlparse(url)
          host = p.hostname or ""
          port = p.port or 5432
          if host.endswith(".pooler.supabase.com") and port == 5432:
              raise SystemExit("SUPABASE_DATABASE_URL está usando pooler Session (5432). Cambia a Transaction pooler (6543).")
          print(f"DB host={host} port={port}")
          PY

      - name: Apply migrations (Supabase)
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DEBUG: "false"
          ENVIRONMENT: "production"
          USE_REMOTE_DB: "true"
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: python manage.py migrate --noinput

  deploy_production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [migrate_production]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel deploy --prod --token="$VERCEL_TOKEN"

  maintenance:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Supabase URL (pooler)
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          python - <<'PY'
          import os
          from urllib.parse import urlparse
          url = os.environ.get("SUPABASE_DATABASE_URL", "")
          if not url:
              raise SystemExit("SUPABASE_DATABASE_URL no está configurada")
          p = urlparse(url)
          host = p.hostname or ""
          port = p.port or 5432
          if host.endswith(".pooler.supabase.com") and port == 5432:
              raise SystemExit("SUPABASE_DATABASE_URL está usando pooler Session (5432). Cambia a Transaction pooler (6543).")
          print(f"DB host={host} port={port}")
          PY

      - name: Mantenimiento de BD (Supabase)
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DEBUG: "false"
          ENVIRONMENT: "production"
          USE_REMOTE_DB: "true"
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          if [ "${{ github.event.inputs.task }}" = "fake_migration" ]; then
            echo "Aplicando --fake a ${{ github.event.inputs.app }} ${{ github.event.inputs.migration }}"
            python manage.py migrate "${{ github.event.inputs.app }}" "${{ github.event.inputs.migration }}" --fake
            python manage.py migrate --noinput
          else
            echo "Tarea de mantenimiento no soportada: ${{ github.event.inputs.task }}"
            exit 1
          fi
