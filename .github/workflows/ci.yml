          DEBUG: "False"
          POSTGRESQL_DB_HOST: postgres
          POSTGRESQL_DB_USER: postgres.ictbdlwwwhentsywyfch
          POSTGRESQL_DB_PASSWORD: 4vmKE5mLHL6vj
          POSTGRESQL_DB_NAME: aws-0-us-west-2.pooler.supabase.com
          POSTGRESQL_DB_PORT: "6543"
