{% extends 'base_core.html' %}
{% block title %}Almacén - ERP Core{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-slate-800 dark:text-white mb-4">Almacén</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="flex items-center gap-2">
            <button type="submit"
                class="inline-flex items-center px-4 py-2 rounded-lg text-sm font-medium text-white bg-sky-600 hover:bg-sky-700 transition-colors">
                Guardar
            </button>
            <a href="{% url 'inventarios:almacen_list' %}"
               class="inline-flex items-center px-4 py-2 rounded-lg text-sm font-medium border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-zinc-800 transition-colors">
               Cancelar
            </a>
        </div>
    </form>
{% endblock %}
