{% extends 'base_core.html' %}
{% block title %}Eliminar Ubicación{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
    <h1 class="text-2xl font-bold text-slate-800 dark:text-white mb-4">Eliminar Ubicación</h1>
    <p class="mb-4 text-slate-700 dark:text-slate-300">¿Seguro que deseas eliminar esta ubicación?</p>
    <form method="post">
        {% csrf_token %}
        <div class="flex items-center gap-2">
            <button type="submit"
                class="inline-flex items-center px-4 py-2 rounded-lg text-sm font-medium text-white bg-red-600 hover:bg-red-700 transition-colors">
                Eliminar
            </button>
            <a href="{% url 'inventarios:ubicacion_list' %}"
               class="inline-flex items-center px-4 py-2 rounded-lg text-sm font-medium border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-zinc-800 transition-colors">
               Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
