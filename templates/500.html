<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error del Servidor | 500</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .pattern-grid {
            background-color: #f8fafc;
            background-image: linear-gradient(#e2e8f0 1px, transparent 1px),
                              linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
            background-position: center center;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0; }
        }
        .animate-ring {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="h-full pattern-grid flex items-center justify-center p-4">
    <!-- Main Card -->
    <div class="max-w-md w-full bg-white rounded-2xl shadow-[0_20px_50px_-12px_rgba(0,0,0,0.1)] overflow-hidden border border-slate-100 relative">
        <!-- Top Accent Line (Red/Orange for Error) -->
        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-red-500 via-orange-500 to-amber-500"></div>
        
        <div class="p-8 sm:p-10 text-center">
            <!-- Icon Wrapper with pulse effect -->
            <div class="relative group mx-auto w-24 h-24 flex items-center justify-center mb-6">
                <div class="absolute inset-0 bg-red-100 rounded-2xl animate-ring"></div>
                <div class="relative w-24 h-24 bg-red-50 rounded-2xl flex items-center justify-center ring-1 ring-red-100 shadow-sm z-10">
                    <svg class="w-12 h-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
            </div>

            <!-- Headlines -->
            <h1 class="text-6xl font-bold text-slate-900 mb-2 tracking-tight">500</h1>
            <h2 class="text-xl font-semibold text-slate-700 mb-3">Error Interno del Servidor</h2>
            
            <p class="text-slate-500 text-sm leading-relaxed mb-8 px-4">
                Nuestros sistemas han detectado un problema inesperado. El equipo de ingeniería ha sido notificado automáticamente.
            </p>

            <!-- Action Section -->
            <div class="space-y-4">
                <button onclick="window.location.reload()" class="w-full flex justify-center py-3.5 px-4 border border-slate-200 text-sm font-semibold rounded-xl text-slate-700 bg-white hover:bg-slate-50 hover:text-slate-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-200 transition-all duration-200">
                    Intentar Recargar
                </button>

                <a href="/" class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-semibold rounded-xl text-white bg-slate-900 hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 transition-all duration-200 shadow-lg shadow-slate-900/20 active:scale-[0.98]">
                    Volver al Inicio
                </a>
                
                <!-- Footer -->
                <div class="border-t border-slate-50 pt-6 mt-6">
                    <div class="flex items-center justify-center gap-2 text-[10px] uppercase tracking-wider text-slate-400 font-medium">
                        <div class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></div>
                        Sistema de Monitoreo Activo
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
