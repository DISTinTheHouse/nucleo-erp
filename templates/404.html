<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página No Encontrada | 404</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .pattern-grid {
            background-color: #f8fafc;
            background-image: linear-gradient(#e2e8f0 1px, transparent 1px),
                              linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
            background-position: center center;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="h-full pattern-grid flex items-center justify-center p-4">
    <!-- Main Card -->
    <div class="max-w-md w-full bg-white rounded-2xl shadow-[0_20px_50px_-12px_rgba(0,0,0,0.1)] overflow-hidden border border-slate-100 relative">
        <!-- Top Accent Line (Blue/Indigo for 404) -->
        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-blue-600 via-indigo-600 to-violet-600"></div>
        
        <div class="p-8 sm:p-10 text-center">
            <!-- Icon Wrapper with float animation -->
            <div class="group mx-auto w-24 h-24 bg-blue-50 rounded-2xl flex items-center justify-center mb-6 ring-1 ring-blue-100 shadow-sm animate-float">
                <svg class="w-12 h-12 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>

            <!-- Headlines -->
            <h1 class="text-6xl font-bold text-slate-900 mb-2 tracking-tight">404</h1>
            <h2 class="text-xl font-semibold text-slate-700 mb-3">Página No Encontrada</h2>
            
            <p class="text-slate-500 text-sm leading-relaxed mb-8 px-4">
                Lo sentimos, no pudimos encontrar la ruta que buscas. Es posible que haya sido eliminada o la dirección sea incorrecta.
            </p>

            <!-- Action Section -->
            <div class="space-y-6">
                <a href="/" class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-semibold rounded-xl text-white bg-slate-900 hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 transition-all duration-200 shadow-lg shadow-slate-900/20 active:scale-[0.98]">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-4">
                        <svg class="h-5 w-5 text-slate-400 group-hover:text-slate-200 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                    </span>
                    Regresar al Inicio
                </a>
                
                <!-- Footer -->
                <div class="border-t border-slate-50 pt-6">
                    <div class="flex items-center justify-center gap-2 text-[10px] uppercase tracking-wider text-slate-400 font-medium">
                        <div class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></div>
                        Navegación Segura
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
