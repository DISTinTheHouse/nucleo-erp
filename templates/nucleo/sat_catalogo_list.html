{% extends 'base_core.html' %}
{% block title %}{{ titulo }} - ERP Core{% endblock %}
{% block content %}
<div class="mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
    <div>
        <h1 class="text-2xl font-bold text-slate-800 dark:text-white">{{ titulo }}</h1>
        <p class="text-slate-500 dark:text-slate-400 text-sm">{{ subtitle }}</p>
    </div>
    <div class="flex items-center gap-2">
        <a href="{% url 'nucleo:dashboard' %}"
           class="inline-flex items-center justify-center px-4 py-2 rounded-lg text-sm font-medium border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-zinc-800 transition-colors">
            <i class="fas fa-arrow-left mr-2"></i> Regresar
        </a>
    </div>
    </div>

<div class="bg-white dark:bg-zinc-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-200 dark:divide-slate-800">
            <thead class="bg-slate-50 dark:bg-zinc-800/50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wider">Código</th>
                    <th class="px-6 py-3 text-left text-xs font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wider">Descripción</th>
                </tr>
            </thead>
            <tbody class="bg-white dark:bg-zinc-900 divide-y divide-slate-200 dark:divide-slate-800">
                {% for item in items %}
                <tr class="hover:bg-slate-50 dark:hover:bg-zinc-800 transition-colors">
                    <td class="px-6 py-3 text-sm text-slate-800 dark:text-slate-200">{{ item.codigo }}</td>
                    <td class="px-6 py-3 text-sm text-slate-600 dark:text-slate-300">{{ item.descripcion|default:item }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="px-6 py-6 text-center text-slate-500 dark:text-slate-400">
                        Sin registros.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
